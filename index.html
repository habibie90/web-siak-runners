<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siak Runners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .animated-bg { background: linear-gradient(-45deg, #0f172a, #111827, #0f172a, #1e3a8a); background-size: 400% 400%; animation: gradientBG 15s ease infinite; min-height: 100vh; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); }
        .text-shine-white { background: linear-gradient(to right, #f3f4f6 20%, #ffffff 40%, #ffffff 60%, #f3f4f6 80%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        .text-pulse-red { color: #dc2626; text-shadow: 0 0 15px rgba(220, 38, 38, 0.6); animation: pulseRed 2s infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes pulseRed { 0%, 100% { text-shadow: 0 0 15px rgba(220, 38, 38, 0.6); opacity: 1; } 50% { text-shadow: 0 0 25px rgba(220, 38, 38, 0.9); opacity: 0.8; } }
        .page-section { display: none; opacity: 0; transition: opacity 0.4s ease-in-out; }
        .page-active { display: block; opacity: 1; animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="animated-bg text-gray-200 font-sans antialiased selection:bg-red-500 selection:text-white">

    <nav class="glass-panel sticky top-0 z-50 border-b border-gray-700/50">
        <div class="max-w-5xl mx-auto px-2 md:px-4 py-2.5 md:py-3 flex justify-between items-center">
            <div class="flex items-center gap-2 md:gap-3 cursor-pointer shrink-0" onclick="switchPage('klasemen')">
                <img src="Logo SR.jpeg" alt="Logo" class="h-7 md:h-8 rounded object-contain bg-white/95 p-1" />
                <span class="font-bold text-white tracking-widest text-sm md:text-base hidden sm:block">SIAK <span class="text-red-500">RUNNERS</span></span>
            </div>
            <div class="flex gap-1 md:gap-4 text-[10px] md:text-sm font-semibold tracking-wider overflow-x-auto">
                <button onclick="switchPage('klasemen')" id="nav-klasemen" class="text-white bg-white/10 px-2 md:px-3 py-1.5 md:py-2 rounded-lg transition-colors whitespace-nowrap">KLASEMEN</button>
                <button onclick="switchPage('event')" id="nav-event" class="text-gray-400 hover:text-white hover:bg-white/5 px-2 md:px-3 py-1.5 md:py-2 rounded-lg transition-colors whitespace-nowrap">EVENT</button>
                <button onclick="switchPage('upload')" id="nav-upload" class="text-gray-400 hover:text-white hover:bg-white/5 px-2 md:px-3 py-1.5 md:py-2 rounded-lg transition-colors whitespace-nowrap">UPLOAD FOTO</button>
                <button onclick="switchPage('tentang')" id="nav-tentang" class="text-gray-400 hover:text-white hover:bg-white/5 px-2 md:px-3 py-1.5 md:py-2 rounded-lg transition-colors whitespace-nowrap">TENTANG</button>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-3 md:p-8 mt-2">

        <section id="page-klasemen" class="page-section page-active">
            <div class="glass-panel rounded-2xl mb-6 md:mb-8 flex flex-col md:flex-row justify-between items-center p-5 md:p-6 gap-5">
                <div class="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto text-center md:text-left">
                    <div class="p-2 bg-white/95 backdrop-blur-md rounded-xl shadow-lg shrink-0 transform transition hover:scale-105">
                        <img src="Logo SR.jpeg" alt="Logo SIAK RUNNERS" class="h-14 md:h-20 rounded object-contain" />
                    </div>
                    <div class="flex flex-col justify-center">
                        <h1 class="text-xl md:text-4xl font-extrabold tracking-wider uppercase leading-tight drop-shadow-md text-gray-300 mt-2 md:mt-0">
                            LEADERBOARD BULANAN<br />
                            <span class="text-shine-white">SIAK</span> <span class="text-pulse-red">RUNNERS</span>
                        </h1>
                    </div>
                </div>
                <div class="flex flex-col w-full md:w-auto items-center md:items-end border-t md:border-t-0 border-gray-700/80 pt-5 md:pt-0 mt-2 md:mt-0">
                    <p class="text-[10px] md:text-xs text-yellow-400 uppercase font-bold tracking-widest mb-1">Total Jarak</p>
                    <p id="stat-distance" class="text-3xl md:text-4xl font-black text-white tracking-tight">0 <span class="text-lg md:text-xl text-gray-400 font-bold">km</span></p>
                </div>
            </div>

            <div class="glass-panel rounded-2xl overflow-hidden shadow-2xl">
                <div class="bg-gray-900/80 px-4 md:px-6 py-4 md:py-5 flex flex-col md:flex-row justify-between items-center border-b border-gray-700/50 gap-4">
                    <h2 class="text-sm md:text-xl font-black text-white uppercase tracking-widest flex items-center gap-2 md:gap-3 w-full md:w-auto">
                        <svg class="w-5 h-5 md:w-6 md:h-6 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                        Klasemen Resmi
                    </h2>
                    
                    <div class="flex items-center gap-2 w-full md:w-auto">
                        <select id="month-filter" onchange="renderLeaderboardTable()" class="bg-gray-800 border border-gray-600 text-white text-xs md:text-sm rounded-lg focus:ring-red-500 focus:border-red-500 block p-2 w-full md:w-auto outline-none cursor-pointer">
                            <option value="">Memuat data...</option>
                        </select>
                        
                        <button onclick="exportToExcel()" title="Download sebagai File Excel/CSV" class="bg-green-600 hover:bg-green-700 text-white text-xs md:text-sm font-bold py-2 px-3 rounded-lg transition shadow flex items-center gap-1 shrink-0">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Export
                        </button>
                    </div>
                </div>

                <div class="px-4 md:px-6 pt-4 pb-4">
                    <div class="flex justify-center bg
